# I/O Microbenchmark Suite
# Defines 1 I/O-focused microbenchmark for memory/data movement patterns

include:
  - ../_shared.yaml

benchmarks:
  swapbytes:
    entry_point: ./swapbytes.py
    args: []
    tags: [io, memory]

sources: []  # Local I/O Python file

# Unified declarative requirements (works for both AppImage and Docker)
build:
  requires:
    python: [numpy]

  docker:
    base_image: python:3.10-slim

tags: [python, io]
