# GPU Microbenchmark Suite
# Defines 2 CUDA-focused microbenchmarks with local Python implementations

include:
  - ../_shared.yaml

benchmarks:
  cuda-inc:
    entry_point: ./cuda-inc.py
    args: ["10000", "0"]
    tags: [memory]

  cuda-matmul:
    entry_point: ./cuda-matmul.py
    args: ["1024"]
    tags: [compute]

sources: []  # Local CUDA Python files

# Unified declarative requirements (works for both AppImage and Docker)
build:
  requires:
    python: [numba, numpy]
    system: [nvidia-cuda-toolkit]

  docker:
    base_image: nvidia/cuda:12.0.1-runtime-ubuntu22.04
    install_commands:
      - apt-get update && apt-get install -y python3 python3-pip && rm -rf /var/lib/apt/lists/*
      - pip3 install --no-cache-dir numba numpy

tags: [python, gpu, cuda]
