# GPU Microbenchmark Suite
# Defines 2 CUDA-focused microbenchmarks with local Python implementations

include:
  - ../_shared.yaml

benchmarks:
  cuda-inc:
    entry_point: python3
    args: [cuda-inc.py, "10000", "0"]
    tags: [memory]

  cuda-matmul:
    entry_point: python3
    args: [cuda-matmul.py, "1024"]
    tags: [compute]

sources: []  # Local CUDA Python files

build:
  docker:
    base_image: nvidia/cuda:12.0-runtime-ubuntu22.04
    requirements: [numba, numpy]
  appimage:
    runtime: ubuntu:22.04
    system_deps: [nvidia-cuda-toolkit]

tags: [python, gpu, cuda]
