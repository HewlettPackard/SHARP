# MPI Microbenchmark Suite
# Defines 1 MPI-focused microbenchmark for parallel communication patterns

include:
  - ../_shared.yaml

benchmarks:
  mpi-pingpong-single:
    entry_point: ./mpi-pingpong-single.py
    args: ["10"]  # Default: 10 synchronization rounds
    tags: [communication, mpi]

sources: []  # Local MPI Python file

# Unified declarative requirements (works for both AppImage and Docker)
build:
  requires:
    python: [mpi4py, numpy, flask]
    system: [libopenmpi-dev]

  docker:
    base_image: python:3.10-slim

tags: [python, mpi]
