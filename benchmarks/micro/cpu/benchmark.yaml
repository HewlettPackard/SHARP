# CPU Microbenchmark Suite
# Defines 5 CPU-focused microbenchmarks with local Python implementations

include:
  - ../_shared.yaml

benchmarks:
  sleep:
    entry_point: ./sleep.py
    args: ["1.0"]
    tags: [latency]

  nope:
    entry_point: ./nope.py
    args: []
    tags: [overhead]

  inc:
    entry_point: ./inc.py
    args: ["1000", "0"]
    tags: [memory]

  matmul:
    entry_point: ./matmul.py
    args: ["100"]
    tags: [compute]

  bounce:
    entry_point: ./bounce.py
    args: []
    tags: [network]

sources: []  # Local files in same directory

# Unified declarative requirements (works for both AppImage and Docker)
build:
  requires:
    python: [numpy, flask]

  docker:
    base_image: python:3.10-slim

tags: [python, cpu]
