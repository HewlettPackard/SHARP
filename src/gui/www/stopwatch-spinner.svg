<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <style>
    @keyframes spin-fast {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .hand-fast {
      fill: none;
      stroke: currentColor;
      stroke-width: 0.8;
      stroke-linecap: round;
      transform-origin: 8px 8px;
      animation: spin-fast 1s linear infinite;
    }
    .hand-slow {
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
      stroke-linecap: round;
      transform-origin: 8px 8px;
      animation: spin-slow 3s linear infinite;
    }
  </style>

  <!-- Clock face circle -->
  <circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="0.6"/>

  <!-- Center pivot -->
  <circle cx="8" cy="8" r="0.4" fill="currentColor"/>

  <!-- Minute hand (longer, faster) -->
  <line x1="8" y1="8" x2="8" y2="2.5" class="hand-fast"/>

  <!-- Hour hand (shorter, slower) -->
  <line x1="8" y1="8" x2="8" y2="4" class="hand-slow"/>
</svg>
