[project]
name = "sharp"
version = "4.0.0"
description = "Serverless and HPC Application Runtime Profiler"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [
    {name = "SHARP Team"}
]

dependencies = [
    "pyyaml>=6.0.0",
    "numpy>=2.0.0",
    "scipy>=1.15.0",
    "scikit-learn>=1.5.0",
    "parameterized>=0.9.0",
    "isodate>=0.6.0",
    "arviz>=0.21.0",
    "flask>=2.2.0",
    "werkzeug>=3.0.0",
    "requests>=2.31.0",
    "gevent>=24.2.0",
    "mpi4py>=4.0.0",
    "numba>=0.61.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0.0",
    "flask>=2.2.0",
    "werkzeug>=3.0.0",
    "numba>=0.61.0",
    "mpi4py>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.uv]
managed = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, multiple components)",
    "smoke: Smoke tests (minimal end-to-end validation)",
    "slow: Slow tests (profiling, large datasets)",
    "asyncio: Tests requiring asyncio support",
    "performance: Performance regression tests",
]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
